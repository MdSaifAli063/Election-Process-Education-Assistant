server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy for NVIDIA NIM
    location /nim-api/ {
        proxy_pass https://integrate.api.nvidia.com/v1/;
        proxy_set_header Host integrate.api.nvidia.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Proxy for Google Gemini
    location /gemini-api/ {
        proxy_pass https://generativelanguage.googleapis.com/;
        proxy_set_header Host generativelanguage.googleapis.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_set_header Authorization ""; # Critical: Clear auth header from client request
        add_header 'Access-Control-Allow-Origin' '*' always;

    }


    # Proxy for Tavily Search
    location /search-api/ {
        proxy_pass https://api.tavily.com/;
        proxy_set_header Host api.tavily.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }


    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), payment=()";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.nvidia.com https://integrate.api.nvidia.com https://generativelanguage.googleapis.com https://api.tavily.com https://www.google-analytics.com https://region1.google-analytics.com; frame-src 'self' https://www.google.com;";

}


